name: Update Claude CLI Completions

on:
  schedule:
    - cron: "0 12 * * *"  # Every day at 12:00 PM UTC (4:00 AM Pacific)
  workflow_dispatch:      # Allow manual trigger

jobs:
  update-completions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y expect zsh

