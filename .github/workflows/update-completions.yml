name: Update Claude CLI Completions

on:
  schedule:
    - cron: "0 12 * * *"  # Every day at 12:00 PM UTC (4:00 AM Pacific)
  workflow_dispatch:      # Allow manual trigger

jobs:
  update-completions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y expect zsh

      - name: Install Claude CLI
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Add Claude to PATH
        run: echo "$HOME/.claude/bin" >> $GITHUB_PATH

      - name: Run update-completions
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "Follow the instructions in .claude/commands/update-completions.md to update the zsh completions. Do NOT create a PR - only update the files locally. Skip the --create-pr step." \
            --dangerously-skip-permissions

      - name: Verify completion script
        run: ./scripts/verify-completions.sh

      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # Check if there are any changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Get the new Claude version for branch naming
          NEW_VERSION=$(cat claude-version 2>/dev/null || echo "unknown")
          BRANCH_NAME="auto-update/claude-completions-${NEW_VERSION}-$(git rev-parse --short HEAD)"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch
          git checkout -b "$BRANCH_NAME"

          # Use Claude to commit and create PR with intelligent summary
          claude -p "Review the current git changes (use git diff and git status), then commit all changes and create a PR. The branch is already created. Use a commit message that accurately describes what changed in the completion script. For the PR, write a clear summary explaining what new commands, flags, or completions were added/changed/removed based on the actual diff." \
            --dangerously-skip-permissions --allowedTools "Bash(git:*),Bash(gh:*)"
